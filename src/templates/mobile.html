<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>desky mobile camera</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 1rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.2rem; }
    video { width: 100%; border-radius: 8px; background: #000; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; margin-top: 0.75rem; cursor: pointer; }
    #status { font-family: monospace; white-space: pre-wrap; margin-top: 0.75rem; }
    .error { color: #b00020; }
    .ok { color: #1a7a1a; }
    section { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-top: 1.5rem; }
    section h2 { margin-top: 0; font-size: 1.1rem; }
    textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; font-family: inherit; resize: vertical; }
    select { padding: 0.4rem; margin-top: 0.5rem; }
    #ask-result { font-family: monospace; white-space: pre-wrap; margin-top: 0.75rem; }
    .banner { padding: 0.75rem 1rem; border-radius: 8px; margin-top: 0.75rem; background: #fff3cd; color: #7a5b00; border: 1px solid #f0d999; }
    .ask-controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    .ask-controls select, .ask-controls button { margin-top: 0; }
    #mic-btn.listening { background: #b00020; color: #fff; }
  </style>
</head>
<body>
  <h1>desky mobile camera</h1>
  <video id="preview" autoplay playsinline muted></video>
  <div>
    <button id="start-btn">Start camera + streaming</button>
  </div>
  <div id="status">idle</div>

  <canvas id="capture" style="display:none"></canvas>

  <section>
    <h2>Ask Gemini</h2>
    {% if not gemini_configured %}
    <div class="banner">
      ⚠ Gemini not configured{% if gemini_error %} — {{ gemini_error }}{% endif %}.
    </div>
    {% endif %}
    <textarea id="ask-text" rows="3" placeholder="Type a message or paste text to summarize..." {{ "disabled" if not gemini_configured }}></textarea>
    <div class="ask-controls">
      <button id="mic-btn" title="Speak your question">🎤</button>
      <select id="ask-mode" {{ "disabled" if not gemini_configured }}>
        <option value="chat">Chat</option>
        <option value="summary">Summarize</option>
      </select>
      <button id="ask-btn" {{ "disabled" if not gemini_configured }}>Ask</button>
    </div>
    <div id="ask-result"></div>
    <div class="ask-controls">
      <button id="speak-btn">🔊 Speak answer</button>
      <button id="stop-speak-btn">⏹ Stop</button>
    </div>
  </section>

  <script>
    const FRAME_INTERVAL_MS = 200; // ~5 fps, kept low for bandwidth
    const JPEG_QUALITY = 0.6;

    const video = document.getElementById("preview");
    const canvas = document.getElementById("capture");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("start-btn");

    let ws = null;
    let mediaStream = null; // set in start(); the mic recorder pulls its audio track from this
    let captureTimer = null;
    let framesSent = 0;

    function setStatus(text, className = "") {
      statusEl.textContent = text;
      statusEl.className = className;
    }

    function connectSocket() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/ws/camera`);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => setStatus("camera + mic granted, connected, streaming...", "ok");
      ws.onclose = () => {
        setStatus("disconnected from server", "error");
        stopCapture();
      };
      ws.onerror = () => setStatus("websocket error", "error");
      // The server also pushes voice-clip transcripts back over this same
      // connection (see webapp/app.py's ws_camera) — everything else on this
      // socket is one-way (client -> server), so any text message is a
      // transcript/error reply.
      ws.onmessage = (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) {
          return;
        }
        const el = document.getElementById("ask-result");
        if (msg.type === "transcript") {
          document.getElementById("ask-text").value = msg.text;
          ask();
        } else if (msg.type === "error") {
          el.textContent = "STT error: " + msg.error;
          el.className = "error";
        }
      };
    }

    function captureLoop() {
      if (!video.videoWidth) return; // video metadata not ready yet
      if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(
        (blob) => {
          if (blob && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(blob);
            framesSent += 1;
            setStatus(`streaming... ${framesSent} frames sent`, "ok");
          }
        },
        "image/jpeg",
        JPEG_QUALITY
      );
    }

    function stopCapture() {
      if (captureTimer) {
        clearInterval(captureTimer);
        captureTimer = null;
      }
    }

    async function start() {
      if (!window.isSecureContext || !navigator.mediaDevices) {
        setStatus(
          "Camera access needs HTTPS. Open this page as https://<server-ip>:8000/mobile " +
            "(accept the self-signed certificate warning).",
          "error"
        );
        return;
      }
      startBtn.disabled = true;
      setStatus("requesting camera + microphone permission...");
      try {
        // Both video and audio are requested together so the browser's
        // permission prompt covers the microphone too. Video frames stream
        // continuously; the audio track only gets sent when the mic button
        // records a voice question (see the mic-btn click handler below).
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: true,
        });
        mediaStream = stream;
        video.srcObject = stream;
        connectSocket();
        captureTimer = setInterval(captureLoop, FRAME_INTERVAL_MS);
      } catch (e) {
        setStatus("permission denied or camera unavailable: " + e, "error");
        startBtn.disabled = false;
      }
    }

    startBtn.addEventListener("click", start);

    async function ask() {
      const text = document.getElementById("ask-text").value;
      const mode = document.getElementById("ask-mode").value;
      const el = document.getElementById("ask-result");
      if (!text) {
        el.textContent = "type something first";
        el.className = "error";
        return;
      }
      el.textContent = "asking...";
      el.className = "";
      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, mode }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          el.textContent = "error: " + (data.error || res.status);
          el.className = "error";
        } else {
          el.textContent = data.answer;
          el.className = "";
          speak(data.answer); // read the answer aloud right away — hands-free on the phone
        }
      } catch (e) {
        el.textContent = "request failed: " + e;
        el.className = "error";
      }
    }

    document.getElementById("ask-btn").addEventListener("click", ask);

    // ── TTS: 브라우저 내장 음성 출력 ──────────────────────
    function speak(text) {
      if (!('speechSynthesis' in window)) {
        alert("이 브라우저는 음성 출력을 지원하지 않습니다.");
        return;
      }
      if (!text || !text.trim()) return;
      window.speechSynthesis.cancel();        // 이전 음성 중단 후 새로 읽기
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ko-KR";                   // 한국어 목소리
      utter.rate = 1.0;                       // 속도 (0.5~2)
      window.speechSynthesis.speak(utter);
    }

    function stopSpeak() {
      window.speechSynthesis.cancel();
    }

    document.getElementById("speak-btn").addEventListener("click", () => {
      speak(document.getElementById("ask-result").textContent);
    });
    document.getElementById("stop-speak-btn").addEventListener("click", stopSpeak);

    // ── STT: 음성을 녹음해서 서버로 보내고, 서버(Gemini)가 텍스트로 변환 ──
    // (브라우저 내장 SpeechRecognition 대신 백엔드에서 처리 — 서버가 이미
    // 연 /ws/camera 웹소켓을 그대로 재사용한다: 완결된 WebM/Opus 클립 하나를
    // 통째로 보내면, 서버가 EBML 헤더로 오디오임을 알아채 STT를 수행하고
    // 같은 소켓으로 {"type":"transcript", ...}를 돌려준다.)
    const micBtn = document.getElementById("mic-btn");
    let mediaRecorder = null;
    let recordedChunks = [];
    let listening = false;

    function setListening(isListening) {
      listening = isListening;
      micBtn.classList.toggle("listening", isListening);
      micBtn.textContent = isListening ? "🎤 Recording... (tap to stop)" : "🎤";
    }

    if (!window.MediaRecorder) {
      micBtn.disabled = true;
      micBtn.textContent = "🎤 (이 브라우저 미지원)";
    } else {
      micBtn.addEventListener("click", () => {
        if (listening) {
          mediaRecorder.stop(); // onstop below sends the clip and resets state
          return;
        }
        const el = document.getElementById("ask-result");
        if (!mediaStream || !ws || ws.readyState !== WebSocket.OPEN) {
          el.textContent = "Tap \"Start camera + streaming\" first (grants mic access and opens the connection).";
          el.className = "error";
          return;
        }
        recordedChunks = [];
        const audioOnlyStream = new MediaStream(mediaStream.getAudioTracks());
        mediaRecorder = new MediaRecorder(audioOnlyStream, { mimeType: "audio/webm;codecs=opus" });
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
          setListening(false);
          const blob = new Blob(recordedChunks, { type: "audio/webm" });
          ws.send(blob);
          el.textContent = "transcribing...";
          el.className = "";
        };
        mediaRecorder.start();
        setListening(true);
      });
    }
  </script>
</body>
</html>
