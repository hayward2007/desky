<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>desky mobile camera</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 1rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.2rem; }
    video { width: 100%; border-radius: 8px; background: #000; }
    button { padding: 0.6rem 1.2rem; font-size: 1rem; margin-top: 0.75rem; cursor: pointer; }
    #status { font-family: monospace; white-space: pre-wrap; margin-top: 0.75rem; }
    .error { color: #b00020; }
    .ok { color: #1a7a1a; }
    section { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-top: 1.5rem; }
    section h2 { margin-top: 0; font-size: 1.1rem; }
    textarea { width: 100%; box-sizing: border-box; padding: 0.5rem; font-family: inherit; resize: vertical; }
    select { padding: 0.4rem; margin-top: 0.5rem; }
    #ask-result { font-family: monospace; white-space: pre-wrap; margin-top: 0.75rem; }
    .banner { padding: 0.75rem 1rem; border-radius: 8px; margin-top: 0.75rem; background: #fff3cd; color: #7a5b00; border: 1px solid #f0d999; }
    .ask-controls { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-top: 0.5rem; }
    .ask-controls select, .ask-controls button { margin-top: 0; }
    #mic-btn.listening { background: #b00020; color: #fff; }
    #stt-status { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>desky mobile camera</h1>
  <video id="preview" autoplay playsinline muted></video>
  <div>
    <button id="start-btn">Start camera + streaming</button>
  </div>
  <div id="status">idle</div>

  <canvas id="capture" style="display:none"></canvas>

  <section>
    <h2>Ask Gemini</h2>
    {% if not gemini_configured %}
    <div class="banner">
      ⚠ Gemini not configured{% if gemini_error %} — {{ gemini_error }}{% endif %}.
    </div>
    {% endif %}
    <textarea id="ask-text" rows="3" placeholder="Type a message or paste text to summarize..." {{ "disabled" if not gemini_configured }}></textarea>
    <div class="ask-controls">
      <button id="mic-btn" title="Start a hands-free voice conversation">🎙 대화 시작</button>
      <button id="mic-resume-btn" style="display:none;">🎙 탭해서 계속 듣기</button>
      <select id="ask-mode" {{ "disabled" if not gemini_configured }}>
        <option value="chat">Chat</option>
        <option value="summary">Summarize</option>
      </select>
      <button id="ask-btn" {{ "disabled" if not gemini_configured }}>Ask</button>
    </div>
    <div id="ask-result"></div>
    <div id="stt-status" style="font-family: monospace; font-size: 0.8rem; color: #666; margin-top: 0.25rem;"></div>
    <div class="ask-controls">
      <button id="speak-btn">🔊 Speak answer</button>
      <button id="stop-speak-btn">⏹ Stop</button>
    </div>
  </section>

  <section>
    <h2>문서 스캔</h2>
    <p style="font-size:0.9rem">초록 사각형 = 감지된 문서(여러 개). <b>스캔하기</b>를 누른 뒤 문서 중 하나를 눌러 선택.</p>

    <!-- 실시간 감지 -->
    <div id="scan-live">
      <img id="scan-feed" style="width:100%; border-radius:8px; background:#eee; display:block;"
           alt="Start camera first">
      <button id="scan-btn">📷 스캔하기</button>
      <div id="scan-status"></div>
    </div>

    <!-- 스캔 후 선택 -->
    <div id="scan-select" style="display:none;">
      <canvas id="scan-canvas" style="width:100%; border-radius:8px; display:block; cursor:pointer;"></canvas>
      <div id="pick-status" style="font-weight:bold; margin-top:0.5rem;"></div>
      <div class="ask-controls">
        <button id="doc-parse-btn">📄 선택 문서 파싱</button>
        <button id="doc-whole-btn">전체 파싱</button>
        <button id="rescan-btn">↩ 다시 스캔</button>
      </div>
      <div id="doc-parse-result" style="font-family:monospace; white-space:pre-wrap; margin-top:0.75rem;"></div>
      <div class="ask-controls">
        <button id="doc-summary-btn" style="display:none;">📝 요약하기</button>
        <button id="doc-speak-btn" style="display:none;">🔊 읽어주기</button>
      </div>
    </div>
  </section>

  <script>
    const FRAME_INTERVAL_MS = 200; // ~5 fps, kept low for bandwidth
    const JPEG_QUALITY = 0.6;

    const video = document.getElementById("preview");
    const canvas = document.getElementById("capture");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("start-btn");

    let ws = null;
    let mediaStream = null;
    let captureTimer = null;
    let framesSent = 0;

    function setStatus(text, className = "") {
      statusEl.textContent = text;
      statusEl.className = className;
    }

    function connectSocket() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${proto}//${location.host}/ws/camera`);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => setStatus("camera granted, connected, streaming...", "ok");
      ws.onclose = () => {
        setStatus("disconnected from server", "error");
        stopCapture();
      };
      ws.onerror = () => setStatus("websocket error", "error");
      // Legacy path: the server can still transcribe a recorded WebM/Opus
      // clip sent over this socket (see src/api/camera.py's ws_camera) and
      // reply with {"type": "transcript"|"error"} — unused by the voice
      // conversation flow below (that uses the browser's own SpeechRecognition),
      // but kept so a raw voice-clip POST from elsewhere still works.
      ws.onmessage = (event) => {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) {
          return;
        }
        const el = document.getElementById("ask-result");
        if (msg.type === "transcript") {
          document.getElementById("ask-text").value = msg.text;
          ask();
        } else if (msg.type === "error") {
          el.textContent = "STT error: " + msg.error;
          el.className = "error";
        }
      };
    }

    function captureLoop() {
      if (!video.videoWidth) return; // video metadata not ready yet
      if (canvas.width !== video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
      }
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(
        (blob) => {
          if (blob && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(blob);
            framesSent += 1;
            setStatus(`streaming... ${framesSent} frames sent`, "ok");
          }
        },
        "image/jpeg",
        JPEG_QUALITY
      );
    }

    function stopCapture() {
      if (captureTimer) {
        clearInterval(captureTimer);
        captureTimer = null;
      }
    }

    async function start() {
      if (!window.isSecureContext || !navigator.mediaDevices) {
        setStatus(
          "Camera access needs HTTPS. Open this page as https://<server-ip>:8000/mobile " +
            "(accept the self-signed certificate warning).",
          "error"
        );
        return;
      }
      startBtn.disabled = true;
      setStatus("requesting camera permission...");
      try {
        // Voice input uses the browser's own SpeechRecognition (mic-btn below),
        // which requests microphone access itself — so this only needs video.
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false,
        });
        mediaStream = stream;
        video.srcObject = stream;
        connectSocket();
        captureTimer = setInterval(captureLoop, FRAME_INTERVAL_MS);
      } catch (e) {
        setStatus("permission denied or camera unavailable: " + e, "error");
        startBtn.disabled = false;
      }
    }

    startBtn.addEventListener("click", start);

    async function ask() {
      const text = document.getElementById("ask-text").value;
      const mode = document.getElementById("ask-mode").value;
      const el = document.getElementById("ask-result");
      if (!text) {
        el.textContent = "type something first";
        el.className = "error";
        return;
      }
      el.textContent = "asking...";
      el.className = "";
      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, mode }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          el.textContent = "error: " + (data.error || res.status);
          el.className = "error";
        } else {
          el.textContent = data.answer;
          el.className = "";
          speak(data.answer); // read the answer aloud right away — hands-free on the phone
        }
      } catch (e) {
        el.textContent = "request failed: " + e;
        el.className = "error";
      }
    }

    document.getElementById("ask-btn").addEventListener("click", ask);

    // ── TTS: 브라우저 내장 음성 출력 ──────────────────────
    function speak(text) {
      if (!('speechSynthesis' in window)) {
        alert("이 브라우저는 음성 출력을 지원하지 않습니다.");
        return;
      }
      if (!text || !text.trim()) return;
      window.speechSynthesis.cancel();        // 이전 음성 중단 후 새로 읽기
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ko-KR";                   // 한국어 목소리
      utter.rate = 1.0;                       // 속도 (0.5~2)
      window.speechSynthesis.speak(utter);
    }

    function stopSpeak() {
      window.speechSynthesis.cancel();
    }

    document.getElementById("speak-btn").addEventListener("click", () => {
      speak(document.getElementById("ask-result").textContent);
    });
    document.getElementById("stop-speak-btn").addEventListener("click", stopSpeak);

    // ── 음성 대화 모드: 브라우저 내장 SpeechRecognition으로 연속 인식 ──
    // 일정 시간(SILENCE_MS) 말이 없으면 그때까지 들은 문장을 통째로 Gemini에
    // 보내고, 답을 TTS로 읽어준 뒤 자동으로 다시 듣기 시작한다. 인식된 문장이
    // handleVoiceCommand()가 아는 명령(스캔/카메라 시작/모드 전환 등)과
    // 일치하면 Gemini에 묻는 대신 그 기능을 바로 실행한다.
    const micBtn = document.getElementById("mic-btn");
    const micResumeBtn = document.getElementById("mic-resume-btn");
    const askTextEl = document.getElementById("ask-text");
    const resultEl = document.getElementById("ask-result");
    const sttStatusEl = document.getElementById("stt-status");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const SILENCE_MS = 5000;
    const CONFIDENCE_MIN = 0.6;
    const MAX_AUTO_RESTART_FAILS = 3;

    let recognition = null, sessionActive = false, processing = false, speaking = false;
    let currentText = "", committedBase = "", lastLen = 0, silenceTimer = null, speakWatchdog = null;
    let restartTimer = null, restartFailCount = 0, listening = false, listenWatchdog = null;
    // 이벤트가 너무 빨리 반복되면 한 줄짜리 상태 텍스트는 이전 값을 볼 새도 없이
    // 덮어써진다 — 타이밍(이벤트 간 몇 ms 걸렸는지)까지 보이는 짧은 롤링 로그로 대체.
    let sttLog = [], sttLastTs = null;
    function setSttStatus(s) {
      const now = Date.now();
      const delta = sttLastTs === null ? 0 : (now - sttLastTs);
      sttLastTs = now;
      sttLog.push("+" + delta + "ms " + s);
      if (sttLog.length > 10) sttLog.shift();
      if (sttStatusEl) sttStatusEl.textContent = sttLog.join("\n");
    }
    function resetSttLog() { sttLog = []; sttLastTs = null; }
    function hideResumeBtn() { micResumeBtn.style.display = "none"; }
    // recognition.onend 직후 바로 recognition.start()를 부르면 (특히 모바일 Chrome에서)
    // 이전 세션이 아직 완전히 정리되지 않아 InvalidStateError가 나고 조용히 무시되면서
    // 재시작이 실패한다 — 마이크가 켜졌다 꺼졌다만 반복하고 실제로는 안 듣는 상태가 된다.
    // 또한 같은 SpeechRecognition 인스턴스를 반복 재사용하면 몇 번 재시작 후 이벤트가
    // 아예 안 오는 상태로 굳는 경우가 있어(브라우저 버그), 재시작마다 인스턴스를 새로 만든다.
    // iOS(WebKit)는 사용자 탭(gesture) 없이 호출된 recognition.start()를 구조적으로
    // 거부하되, 어떤 버전은 예외를 던지지 않고 그냥 조용히 아무 이벤트도 안 보낸다 —
    // 그래서 start() 성공 여부만으론 부족하고, onstart가 실제로 오는지 워치독으로 확인한다.
    // 계속 실패하면 결국 "탭해서 계속 듣기" 버튼으로 넘긴다 — 그건 진짜 클릭 이벤트 안에서
    // start()를 부르므로 iOS에서도 허용된다.
    function clearRestartTimer() { if (restartTimer) { clearTimeout(restartTimer); restartTimer = null; } }
    function attemptStart(onFail) {
      clearTimeout(listenWatchdog); listening = false;
      try {
        recognition = buildRecognition();
        recognition.start();
        listenWatchdog = setTimeout(() => {
          if (!listening && sessionActive && !processing && !speaking) onFail(new Error("no response"));
        }, 1500);
      } catch (e) { onFail(e); }
    }
    function scheduleRestart(delayMs) {
      clearRestartTimer();
      setSttStatus("재시작 대기 중...");
      restartTimer = setTimeout(() => {
        restartTimer = null;
        if (!sessionActive || processing || speaking) return;
        attemptStart((e) => {
          restartFailCount++;
          if (restartFailCount >= MAX_AUTO_RESTART_FAILS) {
            setSttStatus("자동 재시작 실패(" + e + ") — 아래 버튼을 탭해줘");
            micResumeBtn.style.display = "";
          } else {
            setSttStatus("재시작 실패(" + e + "), 재시도"); scheduleRestart(delayMs);
          }
        });
      }, delayMs);
    }
    function buildRecognition() {
      const r = new SpeechRecognition();
      r.lang = "ko-KR"; r.continuous = true; r.interimResults = true;
      r.onstart = () => { listening = true; clearTimeout(listenWatchdog); restartFailCount = 0; hideResumeBtn(); setSttStatus("듣는 중"); };
      r.onresult = (event) => {
        if (processing || speaking) return;
        let text = "";
        for (let i = 0; i < event.results.length; i++) {
          const res = event.results[i], alt = res[0];
          if (res.isFinal) { const conf = alt.confidence; if (!(conf > 0 && conf < CONFIDENCE_MIN)) text += alt.transcript; }
          else text += alt.transcript;
        }
        currentText = (committedBase + text).trim();
        askTextEl.value = currentText;
        setSttStatus("듣는 중 (" + currentText.length + "자)");
        if (currentText.length > lastLen) { lastLen = currentText.length; resetSilenceTimer(); }
      };
      r.onerror = (event) => {
        setSttStatus("오류: " + event.error);
        if (event.error === "no-speech" || event.error === "aborted") return;
        if (event.error === "not-allowed" || event.error === "service-not-allowed") {
          resultEl.textContent = "STT 오류: 마이크 권한을 허용해줘 (" + event.error + ")";
          resultEl.className = "error"; sessionActive = false;
          clearRestartTimer(); clearTimeout(listenWatchdog); hideResumeBtn(); restartFailCount = 0;
          setSessionUI(false); return;
        }
      };
      r.onend = () => {
        if (sessionActive && !processing && !speaking) {
          if (currentText) committedBase = currentText + " ";
          scheduleRestart(300);
        }
      };
      return r;
    }

    function setSessionUI(active) {
      micBtn.classList.toggle("listening", active);
      micBtn.textContent = active ? "🎙 대화 중 (탭하면 종료)" : "🎙 대화 시작";
    }
    function clearSilenceTimer() { if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; } }
    function resetSilenceTimer() { clearSilenceTimer(); silenceTimer = setTimeout(onSilence, SILENCE_MS); }
    function onSilence() {
      if (!sessionActive || processing || speaking) return;
      const q = currentText.trim(); if (!q) return;
      currentText = ""; committedBase = ""; lastLen = 0;
      if (handleVoiceCommand(q)) return;   // 음성 명령이면 실행하고 종료
      submitToGemini(q);
    }
    async function submitToGemini(q) {
      processing = true; clearSilenceTimer();
      try { recognition.stop(); } catch (e) {}
      resultEl.textContent = "생각 중..."; resultEl.className = "";
      const mode = document.getElementById("ask-mode").value;
      try {
        const res = await fetch("/api/ask", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: q, mode }) });
        const data = await res.json();
        if (!res.ok || data.error) { resultEl.textContent = "error: " + (data.error || res.status); resultEl.className = "error"; resumeListening(); }
        else { resultEl.textContent = data.answer; resultEl.className = ""; speakThenResume(data.answer); }
      } catch (e) { resultEl.textContent = "request failed: " + e; resultEl.className = "error"; resumeListening(); }
    }
    function speakThenResume(text) {
      if (!('speechSynthesis' in window) || !text || !text.trim()) { resumeListening(); return; }
      speaking = true; window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text); utter.lang = "ko-KR"; utter.rate = 1.0;
      const done = () => { if (speakWatchdog) { clearTimeout(speakWatchdog); speakWatchdog = null; } if (!speaking) return; speaking = false; resumeListening(); };
      utter.onend = done; utter.onerror = done;
      speakWatchdog = setTimeout(done, Math.max(5000, text.length * 120));
      window.speechSynthesis.speak(utter);
    }
    function resumeListening() {
      processing = false; speaking = false; currentText = ""; committedBase = ""; lastLen = 0; askTextEl.value = "";
      if (sessionActive) scheduleRestart(300);
    }
    if (!SpeechRecognition) {
      micBtn.disabled = true;
      micBtn.textContent = "🎙 (이 브라우저 미지원 — Chrome 권장)";
    } else {
      recognition = buildRecognition();
      micBtn.addEventListener("click", () => {
        if (!window.isSecureContext) { resultEl.textContent = "마이크는 HTTPS에서만 동작해."; resultEl.className = "error"; return; }
        if (sessionActive) {
          sessionActive = false; processing = false; speaking = false;
          clearSilenceTimer(); clearRestartTimer(); clearTimeout(listenWatchdog); hideResumeBtn(); restartFailCount = 0;
          try { recognition.stop(); } catch (e) {} window.speechSynthesis.cancel();
          setSessionUI(false); resultEl.textContent = "대화 종료됨"; resultEl.className = ""; setSttStatus("정지됨");
        } else {
          sessionActive = true; processing = false; speaking = false; restartFailCount = 0;
          currentText = ""; committedBase = ""; lastLen = 0; askTextEl.value = ""; resetSttLog();
          setSessionUI(true); resultEl.textContent = "듣는 중... 말해봐"; resultEl.className = "";
          attemptStart((e) => {
            setSttStatus("시작 실패(" + e + ") — 아래 버튼을 탭해줘");
            micResumeBtn.style.display = "";
          });
        }
      });
      // 자동 재시작이 계속 실패할 때(주로 iOS)의 탈출구 — 진짜 클릭 이벤트 안에서
      // start()를 부르므로 사용자 제스처 요구사항을 충족한다.
      micResumeBtn.addEventListener("click", () => {
        if (!sessionActive) return;
        clearRestartTimer(); hideResumeBtn(); restartFailCount = 0;
        attemptStart((e) => setSttStatus("시작 실패: " + e));
      });
      setSessionUI(false);
    }

    // ── 문서 스캔: 실시간 감지 → 스캔 → 선택 → 파싱 ──
    const scanFeed = document.getElementById("scan-feed");
    const scanBtn = document.getElementById("scan-btn");
    const scanStatus = document.getElementById("scan-status");
    const scanLive = document.getElementById("scan-live");
    const scanSelect = document.getElementById("scan-select");
    const scanCanvas = document.getElementById("scan-canvas");
    const pickStatus = document.getElementById("pick-status");
    const rescanBtn = document.getElementById("rescan-btn");

    let scanTimer = null, scanDocs = [], scanSelectedId = null, scanFrozen = null;

    function scanStartLive() {
      scanSelect.style.display = "none";
      scanLive.style.display = "";
      scanSelectedId = null;
      if (!scanTimer) {
        scanTimer = setInterval(() => { scanFeed.src = "/api/scan/preview.jpg?t=" + Date.now(); }, 500);
      }
    }
    function scanStopLive() { if (scanTimer) { clearInterval(scanTimer); scanTimer = null; } }

    scanBtn.addEventListener("click", async () => {
      scanStatus.textContent = "스캔 중..."; scanStatus.className = "";
      try {
        const res = await fetch("/api/scan/detect");
        const data = await res.json();
        if (!res.ok || data.error) { scanStatus.textContent = "오류: " + (data.error || res.status); scanStatus.className = "error"; return; }
        scanDocs = data.documents || [];
        scanStatus.textContent = "";
        scanStopLive();
        scanShowSelect(data.image, data.width, data.height);
      } catch (e) { scanStatus.textContent = "요청 실패: " + e; scanStatus.className = "error"; }
    });

    rescanBtn.addEventListener("click", scanStartLive);

    function scanShowSelect(imgSrc, w, h) {
      scanLive.style.display = "none";
      scanSelect.style.display = "";
      scanCanvas.width = w; scanCanvas.height = h;
      scanSelectedId = null;
      document.getElementById("doc-parse-result").textContent = "";
      document.getElementById("doc-summary-btn").style.display = "none";
      document.getElementById("doc-speak-btn").style.display = "none";
      scanFrozen = new Image();
      scanFrozen.onload = () => scanRedraw();
      scanFrozen.src = imgSrc;
      pickStatus.textContent = scanDocs.length ? ("문서 " + scanDocs.length + "개 감지됨 — 사각형을 눌러 선택하세요") : "감지된 문서가 없어요. 다시 스캔해보세요.";
    }

    function scanRedraw() {
      const ctx = scanCanvas.getContext("2d");
      ctx.drawImage(scanFrozen, 0, 0);
      scanDocs.forEach(d => {
        const q = d.quad, sel = d.id === scanSelectedId;
        ctx.lineWidth = sel ? 8 : 4;
        ctx.strokeStyle = sel ? "#ff2d2d" : "#00e000";
        ctx.beginPath();
        ctx.moveTo(q[0][0], q[0][1]);
        for (let i = 1; i < q.length; i++) ctx.lineTo(q[i][0], q[i][1]);
        ctx.closePath(); ctx.stroke();
        const cx = (q[0][0] + q[1][0] + q[2][0] + q[3][0]) / 4;
        const cy = (q[0][1] + q[1][1] + q[2][1] + q[3][1]) / 4;
        ctx.fillStyle = sel ? "#ff2d2d" : "#00e000";
        ctx.font = "bold 48px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("#" + d.id, cx, cy);
      });
    }

    function scanPointInPoly(x, y, poly) {
      let inside = false;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
        const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
      }
      return inside;
    }
    function scanPolyArea(poly) {
      let a = 0;
      for (let i = 0, j = poly.length - 1; i < poly.length; j = i++)
        a += (poly[j][0] + poly[i][0]) * (poly[j][1] - poly[i][1]);
      return Math.abs(a / 2);
    }

    scanCanvas.addEventListener("click", (e) => {
      const rect = scanCanvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (scanCanvas.width / rect.width);
      const y = (e.clientY - rect.top) * (scanCanvas.height / rect.height);
      const hits = scanDocs.filter(d => scanPointInPoly(x, y, d.quad));
      if (!hits.length) return;
      hits.sort((a, b) => scanPolyArea(a.quad) - scanPolyArea(b.quad));
      scanSelectedId = hits[0].id;
      pickStatus.textContent = "문서 #" + scanSelectedId + " 선택됨";
      scanRedraw();
    });

    // ── 선택한 문서 파싱 ──
    const docParseResult = document.getElementById("doc-parse-result");
    const docSummaryBtn = document.getElementById("doc-summary-btn");
    const docSpeakBtn = document.getElementById("doc-speak-btn");
    let lastDocText = "";

    async function parseSelectedDoc(whole) {
      if (!whole && scanSelectedId === null) {
        docParseResult.textContent = "먼저 문서 사각형을 눌러 선택하세요.";
        docParseResult.className = "error";
        return;
      }
      docParseResult.textContent = "문서를 읽는 중... (Gemini)";
      docParseResult.className = "";
      docSummaryBtn.style.display = "none";
      docSpeakBtn.style.display = "none";
      try {
        const body = whole ? {} : { id: scanSelectedId };
        const res = await fetch("/api/scan/parse", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          docParseResult.textContent = "에러: " + (data.error || res.status);
          docParseResult.className = "error";
        } else {
          docParseResult.textContent = data.text;
          docParseResult.className = "";
          lastDocText = data.text;
          docSummaryBtn.style.display = "inline-block";
          docSpeakBtn.style.display = "inline-block";
        }
      } catch (e) {
        docParseResult.textContent = "요청 실패: " + e;
        docParseResult.className = "error";
      }
    }

    document.getElementById("doc-parse-btn").addEventListener("click", () => parseSelectedDoc(false));
    document.getElementById("doc-whole-btn").addEventListener("click", () => parseSelectedDoc(true));

    docSummaryBtn.addEventListener("click", async () => {
      if (!lastDocText) return;
      docParseResult.textContent = "요약 중...";
      try {
        const res = await fetch("/api/ask", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: lastDocText, mode: "summary" }),
        });
        const data = await res.json();
        if (!res.ok || data.error) { docParseResult.textContent = "에러: " + (data.error || res.status); }
        else { docParseResult.textContent = data.answer; lastDocText = data.answer; speak(data.answer); }
      } catch (e) { docParseResult.textContent = "요청 실패: " + e; }
    });

    docSpeakBtn.addEventListener("click", () => speak(docParseResult.textContent));

    // ── 음성 명령: 말한 내용이 어떤 기능과 맥락이 맞으면 그 기능을 실행 ──
    function normCmd(s) { return s.replace(/\s+/g, "").toLowerCase(); }

    function parseDocNumber(t) {
      const d = t.match(/[1-9]/);
      if (d) return parseInt(d[0], 10);
      const words = [[1, ["하나", "첫", "첫번째", "첫째"]], [2, ["둘", "두번째", "둘째"]],
                     [3, ["셋", "세번째", "셋째"]], [4, ["넷", "네번째", "넷째"]], [5, ["다섯", "다섯번째", "다섯째"]]];
      for (const [n, arr] of words) if (arr.some(w => t.includes(w))) return n;
      return null;
    }

    // 명령 실행: 인식 잠깐 멈추고 → 동작 → (안내 음성) → 다시 듣기
    function runCommand(actionFn, sayText) {
      processing = true; clearSilenceTimer();
      try { recognition.stop(); } catch (e) {}
      try { if (actionFn) actionFn(); } catch (e) {}
      resultEl.textContent = "🎧 " + (sayText || "명령 실행"); resultEl.className = "";
      if (sayText) speakThenResume(sayText); else resumeListening();
    }

    // 음성으로 문서 읽기: 선택 → Gemini로 읽어 요약 → 말하기 → 다시 듣기
    // id === null 이면 전체 프레임을 읽음.
    async function voiceReadDoc(id) {
      processing = true; clearSilenceTimer();
      try { recognition.stop(); } catch (e) {}
      if (id !== null) { scanSelectedId = id; scanRedraw(); }
      pickStatus.textContent = (id !== null ? ("문서 #" + id) : "전체") + " 읽는 중...";
      docParseResult.textContent = "문서를 읽는 중... (Gemini)"; docParseResult.className = "";
      try {
        const body = id !== null ? { id: id, mode: "summary" } : { mode: "summary" };
        const res = await fetch("/api/scan/parse", {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
        });
        const data = await res.json();
        const text = (!res.ok || data.error) ? ("읽기 실패: " + (data.error || res.status)) : data.text;
        docParseResult.textContent = text; lastDocText = text;
        docSummaryBtn.style.display = "inline-block"; docSpeakBtn.style.display = "inline-block";
        speakThenResume(text);   // 읽어주고 끝나면 다시 듣기
      } catch (e) {
        docParseResult.textContent = "요청 실패: " + e; docParseResult.className = "error";
        resumeListening();
      }
    }

    // 명령이면 실행 후 true, 아니면 false(→ 평소대로 Gemini 질문)
    function handleVoiceCommand(qRaw) {
      const q = normCmd(qRaw);
      const inSelect = scanSelect.style.display !== "none";

      // 선택 화면에서 "N번" → 그 문서를 읽어줌
      if (inSelect) {
        const n = parseDocNumber(q);
        if (n !== null && scanDocs.some(d => d.id === n)) { voiceReadDoc(n); return true; }
      }

      // 대화 종료 (그만/스톱보다 먼저)
      if (q.includes("대화종료") || q.includes("대화끝") || (q.includes("대화") && q.includes("그만"))
          || q.includes("그만들어") || q.includes("듣기종료") || q.includes("잘있어")) {
        runCommand(() => {
          sessionActive = false; clearSilenceTimer(); window.speechSynthesis.cancel(); setSessionUI(false);
        }, "대화를 종료할게요");
        return true;
      }
      // 다시 스캔 (스캔보다 먼저)
      if (q.includes("다시스캔") || (q.includes("다시") && q.includes("스캔"))) {
        runCommand(() => rescanBtn.click(), "다시 스캔할게요"); return true;
      }
      // 전체 문서 읽기
      if (q.includes("전체") && (q.includes("읽") || q.includes("파싱") || q.includes("스캔") || q.includes("문서"))) {
        voiceReadDoc(null); return true;
      }
      // 선택 문서 읽기: 읽어/파싱 (선택 화면 + 선택돼 있을 때)
      if (inSelect && scanSelectedId !== null && (q.includes("읽") || q.includes("파싱"))) {
        voiceReadDoc(scanSelectedId); return true;
      }
      // 스캔 시작
      if (q.includes("스캔") || (q.includes("문서") && (q.includes("찍") || q.includes("인식")))) {
        runCommand(() => scanBtn.click(), "스캔할게요"); return true;
      }
      // 카메라 시작
      if ((q.includes("카메라") || q.includes("촬영") || q.includes("스트리밍")) &&
          (q.includes("시작") || q.includes("켜") || q.includes("틀") || q.includes("실행") || q.includes("연결"))) {
        runCommand(() => { if (!captureTimer) start(); }, "카메라 시작할게요"); return true;
      }
      // 요약 모드 / 대화 모드 (텍스트 질문용 모드 전환)
      if (q.includes("요약") && (q.includes("모드") || q.includes("바꿔") || q.includes("전환"))) {
        runCommand(() => { document.getElementById("ask-mode").value = "summary"; }, "요약 모드로 바꿀게요"); return true;
      }
      if ((q.includes("채팅") || q.includes("일반") || q.includes("대화")) && (q.includes("모드") || q.includes("바꿔") || q.includes("전환"))) {
        runCommand(() => { document.getElementById("ask-mode").value = "chat"; }, "대화 모드로 바꿀게요"); return true;
      }
      // 마지막 답 다시 읽어줘
      if (q.includes("다시읽") || q.includes("읽어줘") || q.includes("다시말") || q.includes("한번더")) {
        const last = (resultEl.textContent || "").trim();
        runCommand(null, last || "아직 읽을 답이 없어요"); return true;
      }
      // 그만 말해 / 멈춰
      if (q.includes("그만") || q.includes("멈춰") || q.includes("조용") || q.includes("정지") || q.includes("스톱") || q.includes("stop")) {
        runCommand(() => stopSpeak(), ""); return true;
      }
      return false;   // 명령 아님 → Gemini 질문
    }

    scanStartLive();
  </script>
</body>
</html>
